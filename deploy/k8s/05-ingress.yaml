# An Ingress is a routing RULE the ingress controller enforces: "requests for this
# host/path go to this Service." This is the public front door.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: macro-rag
  namespace: macro-rag
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - 168.144.48.142.sslip.io
      secretName: macro-rag-tls
  rules:
    - host: 168.144.48.142.sslip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: macro-rag
                port:
                  number: 80    # matches the Service port above

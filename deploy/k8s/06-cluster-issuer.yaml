# Tells cert-manager how to obtain TLS certificates from Let's Encrypt.
# HTTP-01 challenge: Let's Encrypt hits http://<domain>/.well-known/acme-challenge/...
# and the ingress controller serves the proof automatically.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: justincheong06@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            class: nginx
